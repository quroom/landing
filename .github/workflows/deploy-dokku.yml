name: Deploy To Dokku

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dokku-deploy-landing
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy landing to Dokku
    runs-on: ubuntu-latest
    env:
      DOKKU_HOST: 43.200.44.34
      DOKKU_APP: landing
      BASE_URL: http://43.200.44.34
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${DOKKU_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy to Dokku
        run: |
          git remote add dokku "dokku@${DOKKU_HOST}:${DOKKU_APP}"
          git push dokku "HEAD:main" --force

      - name: Post-deploy smoke checks
        run: ./scripts/post-deploy-smoke.sh

      - name: Summarize deployment checks
        if: always()
        run: |
          echo "## Dokku deploy result" >> "$GITHUB_STEP_SUMMARY"
          echo "- Host: ${DOKKU_HOST}" >> "$GITHUB_STEP_SUMMARY"
          echo "- App: ${DOKKU_APP}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/quroom-deploy-status.json ]; then
            cat /tmp/quroom-deploy-status.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- No smoke status file found" >> "$GITHUB_STEP_SUMMARY"
          fi
